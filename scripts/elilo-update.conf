# /etc/elilo/update.conf — configuration for update-elilo
#
# update-elilo reads this file when called by kernel postinst/postrm hooks
# or when run manually.  Edit these values once after installing elilo;
# they remain correct across all future kernel upgrades.
#
# After editing, run:  sudo update-elilo

# Directory on the ESP where elilo.efi and elilo.conf live.
# Common values:
#   /boot/efi/EFI/elilo      (if you used the elilo-specific directory)
#   /boot/efi/EFI/devuan     (if you used a distro-named directory)
#   /boot/efi/EFI/boot       (fallback/removable media path)
ELILO_DIR=/boot/efi/EFI/elilo

# Root partition for the kernel's root= argument.
# Examples:
#   /dev/sda2        (SATA, second partition)
#   /dev/nvme0n1p2   (NVMe, second partition)
#   /dev/mmcblk0p2   (eMMC/SD card, second partition)
# Run: findmnt -n -o SOURCE /   to find your root device.
ROOT_DEV=/dev/sda2

# Extra kernel parameters appended to every boot entry.
# "ro quiet" is a sensible default.  Remove "quiet" to see boot messages.
# Do NOT add "nomodeset" here unless you have a specific reason — it disables
# KMS and locks you to the firmware's default (often 1024x768) resolution.
APPEND="ro quiet"

# Set to 1 to keep the previous kernel as a fallback "linux-old" entry.
# Set to 0 to only ever have one entry (saves ESP space, less safe).
KEEP_PREVIOUS=1

# Boot menu timeout in tenths of a second (50 = 5 seconds).
TIMEOUT=50

# Set to 1 to show the elilo boot prompt, 0 to boot silently.
PROMPT=1
